<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GRID TERMINAL</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <!-- LOGIN -->
    <section id="loginView" class="panel">
     <div class="panelHeader">
  <div class="tag">SYSTEM :: AUTH</div>
  <div class="tag dim">GRID_NET</div>
</div>

<h1 class="title">SECURE TERMINAL ACCESS</h1>
<p class="sub">Enter credentials to establish a channel.</p>

<div class="loginBox">
  <div class="fieldLabel">USERNAME</div>
  <input id="loginUser" class="input" type="text" autocomplete="off" />

  <div class="fieldLabel" style="margin-top:12px;">PASSWORD</div>
  <input id="loginPass" class="input" type="password" autocomplete="off" />

  <div style="margin-top:16px;">
    <button id="loginBtn" class="btn">AUTHENTICATE</button>
  </div>

  <div id="loginStatus" class="dim smallText" style="margin-top:12px;">
    AWAITING INPUT…
  </div>
</div>
    </section>

    <!-- CHAT -->
    <section id="chatView" class="panel hidden" aria-live="polite">
      <div class="panelHeader">
        <div class="tag" id="systemTag">SYSTEM :: SECURE</div>
        <div class="tag dim" id="channelTag">CH: —</div>
      </div>

      <div class="hudBar">
        <div class="hudItem"><span class="hudLabel">IDENTITY</span> <span class="hudValue" id="identityOut">—</span></div>
        <div class="hudItem"><span class="hudLabel">REMOTE</span> <span class="hudValue" id="remoteOut">—</span></div>
        <div class="hudItem"><span class="hudLabel">INTEGRITY</span> <span class="hudValue" id="integrityOut">100%</span></div>
        <div class="hudItem"><span class="hudLabel">STATUS</span> <span class="hudValue" id="stageOut">STABLE</span></div>
      </div>

      <div class="layout">
        <!-- MAIN LOG -->
        <div>
          <div id="log" class="log" role="log" aria-label="Chat log"></div>

          <div class="composer">
            <input id="input" class="input" type="text" autocomplete="off" placeholder="TYPE MESSAGE…" />
            <button id="send" class="btn small">SEND</button>
          </div>

          <div class="footerRow">
            <button id="reset" class="btn ghost small">RESET SESSION</button>
            <div class="dim smallText" id="statusOut">READY</div>
          </div>
        </div>

        <!-- FILES SIDEBAR -->
        <aside class="files">
          <div class="filesHeader">
            <div class="tag">FILES</div>
            <div class="tag dim" id="filesHint">LOCKED</div>
          </div>

          <div id="filesList" class="filesList"></div>

          <div class="fileViewerWrap">
            <div class="fileViewerHeader">
              <div class="dim smallText" id="fileTitle">—</div>
              <button id="closeFile" class="btn ghost small">CLOSE</button>
            </div>
            <pre id="fileBody" class="fileBody">Select a file to view.</pre>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
